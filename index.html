<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя картинка на GitHub Pages</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
