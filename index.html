<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadlock Fansite</title>
    <style>
        /* Основной фон сайта */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('bg.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
            padding: 50px 20px;
            background: rgba(0, 0, 0, 0.4); /* Затемнение фона для читаемости */
        }

        /* Стили для отсеков */
        .section {
            width: 100%;
            max-width: 1000px;
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid #444;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .section-header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #edb65c; /* Золотистый акцент в стиле игры */
            padding-bottom: 15px;
        }

        .section-header img {
            max-height: 60px; /* Размер логотипа в заголовке */
        }

        h2 {
            font-size: 2rem;
            margin: 0;
            color: #edb65c;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Сетка для картинок внутри отсеков */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }

        .card-text {
            padding: 10px;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">

    <section class="section">
        <div class="section-header">
            <img src="logo.png" alt="Logo PNG"> </div>
        <div class="gallery">
            <div class="card">
                <img src="pic1.jpg" alt="Картинка 1">
                <div class="card-text">Описание 1</div>
            </div>
            </div>
    </section>

    <section class="section">
        <div class="section-header">
            <h2>Агенти Габена не витримали</h2>
        </div>
        <div class="gallery">
            <div class="card">
                <img src="pic2.jpg" alt="Картинка 2">
                <div class="card-text">Агент №1</div>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="section-header">
            <h2>Легенди дедлока</h2>
        </div>
        <div class="gallery">
            <div class="card">
                <img src="pic3.jpg" alt="Картинка 3">
                <div class="card-text">Легенда №1</div>
            </div>
        </div>
    </section>

</div>

</body>
</html>
